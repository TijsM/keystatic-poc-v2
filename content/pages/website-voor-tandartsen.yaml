introText: >-
  Patiënten kiezen hun tandarts steeds vaker online. Ze lezen reviews,
  bekijken behandelingen en willen het liefst direct een afspraak maken. Een
  professionele website is daarom onmisbaar voor elke tandartspraktijk. Met
  Rodi Sites krijg je een verzorgde, moderne website die nieuwe patiënten
  aantrekt, vertrouwen wekt en je praktijk 24/7 bereikbaar maakt. Wij
  regelen alles - van ontwerp tot onderhoud.
painPoints:
  - icon: "🔍"
    title: Patiënten zoeken online naar een tandarts
    description: >-
      Veel mensen zoeken via Google naar een tandarts in de buurt. Zonder
      een goed vindbare website mis je potentiële patiënten die simpelweg
      niet weten dat jouw praktijk bestaat.
  - icon: "📅"
    title: Moeilijk bereikbaar voor nieuwe patiënten
    description: >-
      Patiënten willen snel en makkelijk contact kunnen opnemen. Met
      een duidelijk contactformulier verlaag je de drempel. Wil je nog
      een stap verder gaan? Met een online afsprakenplanner
      (beschikbaar in het Op Maat pakket) plan patiënten 24/7 zelf hun
      afspraak in.
  - icon: "🖥️"
    title: Verouderde of geen website
    description: >-
      Een gedateerde website doet afbreuk aan het vertrouwen in je
      praktijk. Patiënten twijfelen of jouw behandelingen wel modern
      en up-to-date zijn als je website dat niet uitstraalt.
benefits:
  - title: Online afspraken maken
    description: >-
      Wil je dat patiënten online een afspraak kunnen inplannen? Met ons
      Op Maat pakket integreren we een afsprakenplanner op je website.
      Dit bespaart je balie-team tijd en verlaagt de drempel voor nieuwe
      patiënten.
  - title: Behandelingen helder uitleggen
    description: >-
      Geef patiënten vooraf duidelijke informatie over behandelingen
      zoals vullingen, kronen of implantaten. Dit neemt angst weg en
      laat zien dat je praktijk transparant en deskundig is. Met aparte
      behandelingenpagina's (vanaf het Professioneel pakket) ga je nog
      een stap verder.
  - title: Nieuwe patiënten aantrekken
    description: >-
      Dankzij lokale SEO en een professionele uitstraling vinden
      nieuwe patiënten jouw praktijk wanneer ze zoeken op
      "tandarts in de buurt". Een goede eerste indruk online
      vertaalt zich naar meer inschrijvingen.
  - title: Vertrouwen uitstralen
    description: >-
      Een moderne website met teamfoto's, praktijkinformatie en
      patiëntreviews wekt direct vertrouwen. Patiënten voelen zich
      op hun gemak nog voordat ze de praktijk binnenstappen.
features:
  - Online afsprakenplanner (uitbreiding)
