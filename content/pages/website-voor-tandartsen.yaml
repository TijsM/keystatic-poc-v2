faqs:
  - question: Kunnen patiënten online afspraken maken via de website?
    answer: >-
      Ja, met ons Op Maat pakket integreren we een afsprakenplanner op
      je website. Patiënten kunnen dan 24/7 een afspraak inplannen zonder
      te hoeven bellen, via een koppeling met je bestaande praktijksoftware
      of via een los boekingssysteem. In het Basis pakket kun je uiteraard
      al een contactformulier aanbieden.
  - question: Kan ik behandelingen uitleggen op de website?
    answer: >-
      Zeker. Vanaf het Professioneel pakket krijg je aparte pagina's
      voor behandelingen zoals gebitsreiniging, vullingen, kronen,
      implantaten en bleaching. In het Basis pakket kun je behandelingen
      overzichtelijk op je one-pager tonen. Heldere uitleg neemt angst
      weg bij patiënten en verbetert je vindbaarheid in Google.
  - question: Voldoet de website aan de privacywetgeving voor de zorgsector?
    answer: >-
      Ja, we zorgen ervoor dat je website voldoet aan de AVG. Er worden
      geen patiëntgegevens onnodig opgeslagen en het contactformulier
      is beveiligd. We plaatsen een duidelijk privacybeleid en
      cookieverklaring op de website.
  - question: Kan ik mijn team voorstellen op de website?
    answer: >-
      Absoluut. Vanaf het Professioneel pakket krijg je een aparte
      teampagina met foto's, namen en specialisaties van je tandartsen
      en mondhygiënisten. In het Basis pakket kun je je team op je
      one-pager voorstellen. Dit maakt je praktijk persoonlijk en
      toegankelijk - patiënten weten alvast bij wie ze terechtkomen.
  - question: Wat kost een website voor mijn tandartspraktijk?
    answer: >-
      Onze websites beginnen vanaf €75 per maand, zonder opstartkosten.
      Alles is inbegrepen: ontwerp, hosting, onderhoud, SSL-certificaat
      en SEO-optimalisatie. Je kunt maandelijks opzeggen, dus je zit
      nergens aan vast. Bekijk onze pakketten voor meer details.
