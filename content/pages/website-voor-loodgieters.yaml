faqs:
  - question: Kunnen klanten mij direct bellen via de website?
    answer: >-
      Ja, je website krijgt een prominente click-to-call knop die altijd
      zichtbaar is. Op mobiel tikt de bezoeker op de knop en belt je
      direct. Ideaal voor spoedklussen waarbij klanten snel een
      loodgieter nodig hebben.
  - question: Kan ik mijn werkgebied aangeven op de website?
    answer: >-
      Zeker. We tonen je werkgebied op een kaart en vermelden de steden
      en regio's waar je actief bent. Dit helpt ook bij lokale SEO,
      zodat je gevonden wordt door klanten in precies die gebieden.
  - question: Hoe word ik beter gevonden dan concurrenten?
    answer: >-
      Wij optimaliseren je website voor lokale zoekopdrachten zoals
      "loodgieter Amsterdam" of "lekkage verhelpen Utrecht". Met de
      juiste technische SEO, snelle laadtijden en relevante content
      verbeter je jouw positie in Google stap voor stap.
  - question: Kan ik mijn Google Reviews laten zien op de website?
    answer: >-
      Op elke website kun je klantreviews en referenties tonen om
      vertrouwen op te bouwen. Wil je een automatische koppeling met
      Google Reviews, zodat nieuwe beoordelingen direct zichtbaar zijn?
      Dat is mogelijk in het Op Maat pakket. Een goede reputatie online
      is één van de sterkste manieren om nieuwe klanten te overtuigen.
  - question: Wat kost een website voor mijn loodgietersbedrijf?
    answer: >-
      Onze websites beginnen vanaf €75 per maand, zonder opstartkosten
      of verborgen kosten. Hosting, onderhoud, SSL en SEO zijn allemaal
      inbegrepen. Je zit nergens aan vast en kunt maandelijks opzeggen.
      Bekijk onze pakketten voor de optie die bij je past.
