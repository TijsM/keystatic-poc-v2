introText: >-
  Wanneer een leiding springt of de cv-ketel uitvalt, zoeken mensen direct op
  Google naar "loodgieter in de buurt". Als jij daar niet verschijnt, gaat die
  klus naar de concurrent. Met een professionele website van Rodi Sites ben je
  24/7 vindbaar, kunnen klanten je met één klik bellen en laat je direct zien
  welke diensten je aanbiedt. Geen gedoe met platforms die een commissie
  vragen - jouw eigen website, jouw klanten.
painPoints:
  - icon: "📍"
    title: Klanten zoeken "loodgieter in de buurt"
    description: >-
      Bij een lekkage of storing zoeken mensen onmiddellijk online naar
      hulp. Als je geen website hebt die lokaal goed scoort, ga je
      waarschijnlijk die spoedklussen mislopen aan concurrenten die
      wél zichtbaar zijn.
  - icon: "👻"
    title: Geen online zichtbaarheid
    description: >-
      Zonder eigen website ben je onzichtbaar voor het grootste deel
      van je potentiële klanten. Zelfs als je uitstekend werk levert,
      komen nieuwe klanten niet vanzelf als ze je niet kunnen vinden.
  - icon: "🏢"
    title: Afhankelijk van platforms
    description: >-
      Platforms als Werkspot of Zoofy vragen commissie per opdracht en
      je hebt geen controle over je eigen profiel. Met een eigen website
      betaal je geen commissie, bouw je aan je eigen merk en ben je niet
      afhankelijk van een derde partij.
benefits:
  - title: Direct gebeld worden
    description: >-
      Jouw website bevat een click-to-call knop waarmee klanten je met
      één druk op de knop bellen. Vooral bij spoedklussen maakt dit het
      verschil - de klant hoeft niet te zoeken naar je nummer.
  - title: Diensten duidelijk presenteren
    description: >-
      Van lekkages verhelpen tot cv-ketel onderhoud: laat klanten precies
      zien wat je aanbiedt. Met het Professioneel pakket krijg je aparte
      dienstenpagina's, wat ook je vindbaarheid in Google per dienst
      verbetert.
  - title: Klantreviews tonen
    description: >-
      Laat tevreden klanten voor je spreken. Op je website kun je
      klantreviews en referenties tonen om vertrouwen op te bouwen.
      Wil je een live koppeling met Google Reviews? Dat kan met ons
      Op Maat pakket.
  - title: Lokale SEO die werkt
    description: >-
      We optimaliseren je website voor lokale zoekopdrachten zodat je
      verschijnt wanneer iemand zoekt op "loodgieter" gevolgd door jouw
      stad of regio. Zo komen de klussen uit jouw werkgebied naar jou toe.
features:
