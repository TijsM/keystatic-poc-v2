slug: website-voor-timmermannen
metaTitle: Website voor Timmermannen | Vanaf €75/mnd | Rodi Sites
metaDescription: >-
  Professionele website voor je timmerbedrijf. Meer klanten via Google,
  projecten tonen en offertes ontvangen. Vanaf €75/maand, geen opstartkosten.
industry: Timmermannen
heroHeadline: Een professionele website voor jouw timmerbedrijf
heroSub: >-
  Laat je vakmanschap zien en trek meer klanten aan met een website die dag en
  nacht voor je werkt. Vanaf €75 per maand, zonder opstartkosten.
introText: >-
  Als timmerman draait alles om precisie en kwaliteit - en dat moet je website
  ook uitstralen. Steeds meer particulieren en bedrijven zoeken via Google naar
  een timmerman in de buurt. Zonder eigen website mis je die opdrachten. Met een
  professionele website van Rodi Sites toon je jouw projecten, ontvang je direct
  offerteaanvragen en word je beter gevonden in jouw regio. Geen technisch
  gedoe, wij regelen alles voor je.
painPoints:
  - icon: "🔍"
    title: Klanten vinden je niet online
    description: >-
      Particulieren en bedrijven zoeken dagelijks naar "timmerman in de buurt"
      op Google. Zonder website besta je voor hen simpelweg niet. Je concurrent
      die wél online zichtbaar is, pakt die opdrachten.
  - icon: "📢"
    title: Mond-tot-mondreclame groeit niet meer
    description: >-
      Via-via werkt prima, maar je bereikt alleen je directe netwerk. Een
      website opent de deur naar nieuwe klanten die jou nog niet kennen maar
      wel op zoek zijn naar een betrouwbare timmerman.
  - icon: "⚔️"
    title: Concurrenten zijn je voor
    description: >-
      Andere timmerbedrijven in jouw regio hebben al een professionele website.
      Zonder eigen online aanwezigheid verlies je opdrachten aan concurrenten
      die klanten wél online kunnen overtuigen.
benefits:
  - title: Meer offerteaanvragen
    description: >-
      Jouw website bevat een laagdrempelig offerteformulier waarmee
      geïnteresseerden direct een aanvraag kunnen doen. Ook 's avonds en in
      het weekend ontvang je aanvragen terwijl jij op de bouwplaats staat.
  - title: Professionele uitstraling
    description: >-
      Een verzorgde website laat zien dat je een serieus timmerbedrijf runt.
      Klanten vertrouwen eerder een vakman met een duidelijke online
      presentatie dan eentje die alleen op Marktplaats te vinden is.
  - title: Projecten in beeld brengen
    description: >-
      Toon je vakmanschap met foto's van dakkapellen, uitbouwen, keukens en
      maatwerk meubels. Visueel bewijs van je kwaliteit overtuigt twijfelende
      klanten sneller dan elk verkoopverhaal.
  - title: Lokaal gevonden worden
    description: >-
      Met lokale SEO en Google Maps integratie word je gevonden door klanten
      in jouw werkgebied. Of ze nu zoeken op "timmerman Rotterdam" of
      "timmerbedrijf in de buurt" - jij verschijnt in de resultaten.
features:
  - Projectportfolio met foto's
  - Offerte aanvraagformulier
  - Google Maps integratie
  - Overzicht van diensten (dakkapellen, verbouwingen, maatwerk)
  - Klantreviews en referenties
  - Zoekmachineoptimalisatie (SEO)
  - Snelle, mobiele website
  - Maandelijks onderhoud en updates
faqs:
  - question: Kan ik foto's van mijn timmerprojecten laten zien?
    answer: >-
      Ja, je website krijgt een uitgebreid projectportfolio waar je foto's
      kunt plaatsen van dakkapellen, uitbouwen, kozijnen, maatwerk meubels en
      andere projecten. Je kunt deze zelf aanvullen of wij doen het voor je.
  - question: Hoe helpt een website mij aan meer opdrachten?
    answer: >-
      Je website bevat een offerteformulier dat bezoekers direct kunnen
      invullen. Daarnaast zorgen wij met SEO dat je hoger in Google komt bij
      zoekopdrachten als "timmerman" in jouw regio. Meer zichtbaarheid
      betekent meer aanvragen.
  - question: Ik sta de hele dag op de bouwplaats, hoeveel tijd kost dit?
    answer: >-
      Heel weinig. Wij bouwen de complete website voor je en verzorgen het
      onderhoud. Je levert je bedrijfsgegevens en foto's aan, en wij doen
      de rest. Na oplevering hoef je er niets aan te doen - tenzij je
      wijzigingen wilt, die regelen wij ook.
  - question: Wat kost een website voor mijn timmerbedrijf?
    answer: >-
      Onze websites beginnen vanaf €75 per maand, zonder opstartkosten of
      verborgen bijkomsten. Alles is inbegrepen: ontwerp, hosting,
      onderhoud, SSL-certificaat en SEO-optimalisatie. Bekijk onze
      pakketten voor de optie die het best bij jouw bedrijf past.
  - question: Kan ik mijn specialisaties vermelden op de website?
    answer: >-
      Zeker. We maken een duidelijk overzicht van al je diensten, of je nu
      gespecialiseerd bent in dakkapellen, houtskeletbouw, restauratie of
      interieurbouw. Zo weten klanten direct wat je kunt en nemen ze
      sneller contact op.
