slug: website-voor-hoveniers
metaTitle: Website voor Hoveniers | Vanaf €75/mnd | Rodi Sites
metaDescription: >-
  Professionele website voor je hoveniersbedrijf. Meer klanten via Google,
  tuinprojecten tonen en offertes ontvangen. Vanaf €75/maand, geen opstartkosten.
industry: Hoveniers
heroHeadline: Een professionele website voor jouw hoveniersbedrijf
heroSub: >-
  Laat je groenste werk zien en trek meer klanten aan met een website die dag en
  nacht voor je werkt. Vanaf €75 per maand, zonder opstartkosten.
introText: >-
  Als hovenier creëer je buitenruimtes waar mensen van genieten. Maar hoe vinden
  nieuwe klanten jouw bedrijf? Steeds meer huiseigenaren zoeken via Google naar
  een hovenier in de buurt. Zonder eigen website mis je die opdrachten. Met een
  professionele website van Rodi Sites toon je jouw tuinprojecten, ontvang je
  direct offerteaanvragen en word je beter gevonden in jouw regio. Geen technisch
  gedoe, wij regelen alles voor je.
painPoints:
  - icon: "🔍"
    title: Klanten vinden je niet online
    description: >-
      Huiseigenaren zoeken op Google naar "hovenier in de buurt" als ze hun
      tuin willen laten aanleggen of onderhouden. Zonder website besta je
      voor hen niet en gaat de opdracht naar je concurrent.
  - icon: "📢"
    title: Je mooiste tuinen blijven onzichtbaar
    description: >-
      Je hebt prachtige tuinen aangelegd, maar potentiële klanten kunnen die
      nergens terugzien. Een online portfolio laat je vakmanschap zien aan
      iedereen die op zoek is naar een hovenier.
  - icon: "⚔️"
    title: Concurrenten staan al op pagina 1
    description: >-
      Andere hoveniersbedrijven in jouw regio zijn al online zichtbaar met
      inspirerende tuinfoto's en klantreviews. Zonder eigen website verlies
      je opdrachten aan concurrenten die online beter presenteren.
benefits:
  - title: Meer offerteaanvragen
    description: >-
      Jouw website bevat een laagdrempelig offerteformulier waarmee
      geïnteresseerden direct een aanvraag doen. Of het nu gaat om een
      tuinaanleg of tuinonderhoud - aanvragen komen ook buiten werktijden
      binnen.
  - title: Tuinportfolio met seizoensfoto's
    description: >-
      Toon je mooiste tuinen in verschillende seizoenen. Laat zien hoe een
      tuin er in het voorjaar en de zomer uitziet. Visuele inspiratie is
      voor hoveniers het krachtigste verkoopargument.
  - title: Vertrouwen door klantreviews
    description: >-
      Tevreden klanten zijn je beste reclame. Toon hun ervaringen en
      beoordelingen op je website zodat nieuwe klanten direct zien dat
      je betrouwbaar en vakkundig bent.
  - title: Lokaal gevonden worden
    description: >-
      Met lokale SEO en Google Maps integratie word je gevonden door klanten
      in jouw werkgebied. Of ze nu zoeken op "hovenier Eindhoven" of
      "hoveniersbedrijf in de buurt" - jij verschijnt in de resultaten.
features:
  - Tuinportfolio met seizoensfoto's
  - Offerte aanvraagformulier
  - Google Maps integratie
  - Overzicht van diensten (aanleg, onderhoud, bestrating)
  - Klantreviews en referenties
  - Zoekmachineoptimalisatie (SEO)
  - Snelle, mobiele website
  - Maandelijks onderhoud en updates
faqs:
  - question: Kan ik foto's van mijn tuinprojecten laten zien?
    answer: >-
      Ja, je website krijgt een uitgebreid tuinportfolio waar je foto's per
      project kunt plaatsen. Denk aan tuinaanleg, terrassen, vijvers en
      beplantingsplannen. Je kunt ook seizoensfoto's toevoegen om te laten
      zien hoe een tuin zich door het jaar heen ontwikkelt.
  - question: Hoe helpt een website mij in het voorseizoen aan klanten?
    answer: >-
      In het voorjaar zoeken veel huiseigenaren online naar een hovenier.
      Met een goed geoptimaliseerde website sta je bovenaan in Google
      wanneer de vraag piekt. Zo begin je het seizoen met een volle agenda
      in plaats van te wachten op telefoontjes.
  - question: Ik werk het liefst in de tuin, hoeveel tijd kost dit?
    answer: >-
      Heel weinig. Wij bouwen de complete website voor je en verzorgen het
      onderhoud. Je levert je bedrijfsgegevens en tuinfoto's aan, en wij
      doen de rest. Na oplevering hoef je er niets aan te doen - tenzij je
      wijzigingen wilt, die regelen wij ook.
  - question: Wat kost een website voor mijn hoveniersbedrijf?
    answer: >-
      Onze websites beginnen vanaf €75 per maand, zonder opstartkosten of
      verborgen bijkomsten. Alles is inbegrepen: ontwerp, hosting,
      onderhoud, SSL-certificaat en SEO-optimalisatie. Bekijk onze
      pakketten voor de optie die het best bij jouw bedrijf past.
  - question: Kan ik ook tuinonderhoud als losse dienst aanbieden?
    answer: >-
      Zeker. We maken een duidelijk overzicht van al je diensten, van
      complete tuinaanleg tot periodiek onderhoud, snoeien en
      onkruidbestrijding. Klanten kunnen per dienst een offerte aanvragen
      zodat je ook doorlopende onderhoudscontracten binnenhaalt.
