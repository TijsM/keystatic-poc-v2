slug: website-voor-personal-trainers
metaTitle: Website voor Personal Trainers | Rodi Sites
metaDescription: >-
  Professionele website voor personal trainers vanaf €75/maand.
  Transformaties tonen, meer klanten aantrekken en online boeken met Op Maat.
industry: Personal Trainers
heroHeadline: Een professionele website die klanten voor je laat werken
heroSub: >-
  Kom professioneel over, toon je resultaten en trek meer klanten aan
  - zodat jij je kunt focussen op trainen.
introText: >-
  Als personal trainer is jouw persoonlijkheid je merk. Maar een
  Instagram-pagina alleen is niet genoeg om serieus genomen te worden.
  Potentiële klanten willen je pakketten bekijken, resultaten zien en
  direct kunnen boeken - zonder eerst een DM te sturen. Een eigen
  website geeft je die professionele uitstraling en maakt het makkelijk
  om nieuwe klanten aan te trekken. Bij Rodi Sites bouwen we websites
  die converteren. Geen gedoe met techniek, gewoon resultaat. Vanaf
  €75 per maand.
painPoints:
  - icon: "📲"
    title: Alleen zichtbaar op social media
    description: >-
      Instagram en TikTok zijn prima voor bereik, maar je bent afhankelijk
      van algoritmes. Een eigen website is jouw vaste plek op het internet
      - altijd bereikbaar, altijd professioneel, en volledig onder jouw
      controle.
  - icon: "🎨"
    title: Geen professionele uitstraling
    description: >-
      Zonder website kom je minder serieus over. Potentiële klanten die
      investeren in personal training verwachten een professional - en
      die indruk begint online. Een LinkTree-pagina is niet genoeg om
      dat vertrouwen te wekken.
  - icon: "📅"
    title: Klanten boeken is omslachtig
    description: >-
      Heen en weer appen over beschikbaarheid kost je tijd en energie.
      Zonder een gestroomlijnd boekingssysteem verlies je potentiële
      klanten die liever direct een tijdslot kiezen en betalen.
benefits:
  - title: Professioneel overkomen
    description: >-
      Een strakke website met je verhaal, aanpak en resultaten laat zien
      dat je een serieuze professional bent. Potentiële klanten voelen
      direct dat ze bij jou in goede handen zijn.
  - title: Online boeken zonder gedoe
    description: >-
      Met ons Op Maat pakket koppelen we een boekingssysteem aan je website.
      Klanten kiezen zelf een tijdslot en boeken direct. Geen appjes, geen
      misverstanden. Jij ziet je agenda vullen terwijl je bezig bent met
      wat je het liefst doet.
  - title: Transformaties en resultaten tonen
    description: >-
      Niets overtuigt zo sterk als echte resultaten. Met een
      transformatie-galerij op je website laat je potentiële klanten zien
      wat ze kunnen bereiken - en dat jij de trainer bent die hen daarbij
      helpt.
  - title: Pakketten en prijzen helder presenteren
    description: >-
      Geen verwarring meer over wat je aanbiedt. Presenteer je pakketten
      overzichtelijk met prijzen, zodat klanten direct kunnen kiezen wat
      bij hen past en sneller de stap zetten.
features:
  - Online boekingssysteem (Op Maat)
  - Transformatie-galerij met voor-en-na foto's
  - Pakketten en prijzenpagina (Professioneel+)
  - Blog met trainingstips en voedingsadvies (Professioneel+)
  - Instagram feed integratie (Op Maat)
  - Klantervaringen en testimonials
  - Zoekmachineoptimalisatie (SEO)
  - Snelle en veilige hosting
  - Maandelijks onderhoud en updates
faqs:
  - question: Kan ik mijn pakketten en prijzen op de website zetten?
    answer: >-
      Ja. Met ons Professioneel pakket (vanaf €129/maand) maken we een
      overzichtelijke pakkettenpagina waar je al je aanbiedingen presenteert
      - van losse sessies tot maandpakketten en online coaching. Klanten
      zien direct wat je biedt en wat het kost.
  - question: Hoe werkt het online boekingssysteem?
    answer: >-
      Met ons Op Maat pakket koppelen we je website aan een boekingssysteem
      waar klanten beschikbare tijdslots zien en direct kunnen reserveren.
      Dit synchroniseert met je agenda zodat je nooit dubbel geboekt wordt.
  - question: Kan ik voor-en-na foto's van klanten tonen?
    answer: >-
      Absoluut. We bouwen een transformatie-galerij waar je resultaten
      van klanten kunt showcasen. Dit is een van de krachtigste manieren
      om nieuwe klanten te overtuigen en werkt veel beter dan alleen
      tekst.
  - question: Wordt mijn website ook gevonden via Google?
    answer: >-
      Zeker. We optimaliseren je website voor zoektermen als 'personal
      trainer + jouw plaats'. Zo word je gevonden door mensen die actief
      op zoek zijn naar een trainer in hun omgeving - precies de klanten
      die je wilt bereiken.
  - question: Kan ik mijn Instagram koppelen aan de website?
    answer: >-
      Ja. Met ons Op Maat pakket verschijnen je nieuwste Instagram-posts
      automatisch op je website. Zo blijft je site altijd actueel met
      verse content en versterk je de connectie tussen je social media
      en je website.
