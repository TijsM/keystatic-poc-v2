slug: website-voor-restaurants
metaTitle: Website voor Restaurants & Horeca | Rodi Sites
metaDescription: >-
  Professionele website voor je restaurant vanaf €75/maand. Digitale
  menukaart, meer gasten via Google en online reserveren met Op Maat.
industry: Restaurants & Horeca
heroHeadline: Een website die gasten naar jouw restaurant brengt
heroSub: >-
  Toon je menukaart, breng de sfeer van jouw zaak over en laat gasten
  online reserveren - nog voordat ze een stap binnen zetten.
introText: >-
  Een goed restaurant verkoopt meer dan eten - het verkoopt een beleving.
  En die beleving begint online. Gasten bekijken je menu, checken
  openingstijden en lezen reviews voordat ze reserveren. Met een
  professionele website van Rodi Sites maak je die eerste indruk
  onvergetelijk. Wij regelen alles: van een prachtige digitale menukaart
  tot Google-vindbaarheid. Wil je ook online reserveringen? Dan regelen
  we dat met ons Op Maat pakket. Jij focust op je gasten, wij zorgen
  dat ze je vinden. Vanaf €75 per maand.
painPoints:
  - icon: "📱"
    title: Gasten willen je menukaart online bekijken
    description: >-
      De meeste gasten checken het menu voordat ze ergens gaan eten. Als je
      menukaart niet online staat - of alleen als onleesbare PDF - verlies
      je gasten aan restaurants die het wél goed doen.
  - icon: "📞"
    title: Reserveren via de telefoon is ouderwets
    description: >-
      Bellen om te reserveren past niet meer bij het verwachtingspatroon
      van je gasten. Ze willen in een paar klikken een tafel boeken,
      op elk moment van de dag. Zonder telefoon of wachttijd.
  - icon: "📍"
    title: Geen zichtbaarheid op Google
    description: >-
      Wanneer iemand zoekt op 'restaurant in de buurt' en jij verschijnt
      niet, dan bestá je niet voor die potentiële gast. Zonder goede
      SEO en een snelle website loop je dagelijks gasten mis.
benefits:
  - title: Online reserveren zonder gedoe
    description: >-
      Met ons Op Maat pakket integreren we een reserveringssysteem naar
      keuze. Gasten boeken een tafel wanneer het hen uitkomt - 's avonds
      laat, in het weekend of onderweg. Jij ontvangt de reservering en
      hoeft niet meer continu de telefoon te bemannen.
  - title: Menukaart altijd up-to-date
    description: >-
      Seizoensmenu, lunchkaart of wijnselectie - alles staat overzichtelijk
      online en is eenvoudig aan te passen. Gasten weten precies wat ze
      kunnen verwachten.
  - title: Gevonden worden op Google
    description: >-
      We optimaliseren je website zodat je verschijnt wanneer mensen zoeken
      op restaurants in jouw regio. Meer zichtbaarheid betekent meer
      reserveringen en meer gasten aan tafel.
  - title: De sfeer van je zaak overbrengen
    description: >-
      Met mooie fotografie, de juiste kleuren en typografie breng je de
      sfeer en het karakter van jouw restaurant online tot leven. Gasten
      krijgen al zin om te komen nog voordat ze het menu hebben gelezen.
features:
  - Online reserveringssysteem (Op Maat)
  - Digitale menukaart met seizoensupdates
  - Instagram feed integratie (Op Maat)
  - Google Maps en routebeschrijving
  - Openingstijden en contactgegevens
  - Fotogalerij van gerechten en interieur
  - Zoekmachineoptimalisatie (SEO)
  - Snelle en veilige hosting
  - Maandelijks onderhoud en updates
faqs:
  - question: Kan ik mijn menukaart zelf aanpassen?
    answer: >-
      Ja. Wijzigingen in je menukaart kun je eenvoudig doorgeven en wij
      passen het snel aan. Of het nu gaat om een nieuw seizoensmenu, een
      dagschotel of een aangepaste wijnkaart - je website is altijd actueel.
  - question: Welk reserveringssysteem wordt gebruikt?
    answer: >-
      Met ons Op Maat pakket integreren we populaire systemen zoals
      Formitable, Couverts of een eigen reserveringsformulier. We kijken
      samen wat het beste past bij jouw restaurant en het aantal
      reserveringen dat je verwacht.
  - question: Kan mijn Instagram feed op de website worden getoond?
    answer: >-
      Zeker. Met ons Op Maat pakket koppelen we je Instagram zodat je
      nieuwste foto's automatisch op je website verschijnen. Zo blijft je
      site dynamisch en vers, zonder dat je er extra werk aan hebt.
  - question: Hoe snel is de website live?
    answer: >-
      Gemiddeld staat je website binnen twee weken online. We
      beginnen met het ontwerp, verwerken je feedback en gaan pas live als
      jij volledig tevreden bent. Je huidige site blijft online tot de
      overstap.
  - question: Kan ik evenementen of speciale avonden aankondigen?
    answer: >-
      Absoluut. We kunnen een sectie toevoegen voor evenementen, thema-avonden
      of seizoensacties. Denk aan een kerst-arrangement, wijnproeverij of
      live muziek - je gasten zien het direct op je website.
