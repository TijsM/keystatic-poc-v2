slug: website-voor-aannemers
metaTitle: Website voor Aannemers | Vanaf €75/mnd | Rodi Sites
metaDescription: >-
  Professionele website voor je aannemersbedrijf. Meer klanten via Google,
  projecten tonen en offertes ontvangen. Vanaf €75/maand, geen opstartkosten.
industry: Aannemers
heroHeadline: Een professionele website voor jouw aannemersbedrijf
heroSub: >-
  Laat je projecten zien en trek meer opdrachtgevers aan met een website die dag
  en nacht voor je werkt. Vanaf €75 per maand, zonder opstartkosten.
introText: >-
  Als aannemer draai je grote en kleine projecten, van verbouwingen tot
  nieuwbouw. Maar hoe vinden nieuwe opdrachtgevers jou? Steeds meer particulieren
  en bedrijven zoeken via Google naar een aannemer in de buurt. Zonder eigen
  website mis je die opdrachten. Met een professionele website van Rodi Sites
  presenteer je jouw projecten, ontvang je direct offerteaanvragen en word je
  beter gevonden in jouw regio. Geen technisch gedoe, wij regelen alles voor je.
painPoints:
  - icon: "🔍"
    title: Nieuwe opdrachtgevers vinden je niet
    description: >-
      Particulieren en bedrijven zoeken op Google naar "aannemer in de buurt"
      als ze willen verbouwen of bouwen. Zonder website besta je voor hen niet
      en gaan de opdrachten naar je concurrent.
  - icon: "📢"
    title: Je projecten zijn onzichtbaar
    description: >-
      Je hebt mooie verbouwingen en nieuwbouwprojecten opgeleverd, maar
      niemand kan dat online terugzien. Potentiële klanten willen bewijs van
      je kwaliteit voordat ze je bellen.
  - icon: "⚔️"
    title: Concurrenten winnen de opdracht
    description: >-
      Andere aannemers in jouw regio presenteren hun projecten online en
      ontvangen offerteaanvragen via hun website. Zonder eigen website mis
      je opdrachten die je prima had kunnen uitvoeren.
benefits:
  - title: Meer offerteaanvragen
    description: >-
      Jouw website bevat een uitgebreid offerteformulier waarmee
      opdrachtgevers direct een aanvraag kunnen doen. Beschrijf het project,
      voeg foto's toe - je ontvangt complete aanvragen ook buiten werktijden.
  - title: Projecten die overtuigen
    description: >-
      Toon je beste verbouwingen, aanbouwen en nieuwbouwprojecten met foto's
      en beschrijvingen. Potentiële klanten zien direct de kwaliteit en
      omvang van je werk en nemen sneller contact op.
  - title: Professionele uitstraling
    description: >-
      Een verzorgde website laat zien dat je een betrouwbaar aannemersbedrijf
      bent. Klanten vertrouwen eerder een aannemer met een professionele
      online presentatie, zeker bij grote verbouwingen.
  - title: Lokaal gevonden worden
    description: >-
      Met lokale SEO en Google Maps integratie word je gevonden door klanten
      in jouw werkgebied. Of ze nu zoeken op "aannemer Den Haag" of
      "aannemersbedrijf in de buurt" - jij verschijnt in de resultaten.
features:
  - Projectportfolio met foto's en beschrijvingen
  - Offerte aanvraagformulier
  - Google Maps integratie
  - Overzicht van diensten (verbouw, nieuwbouw, aanbouw)
  - Klantreviews en referenties
  - Zoekmachineoptimalisatie (SEO)
  - Snelle, mobiele website
  - Maandelijks onderhoud en updates
faqs:
  - question: Kan ik mijn afgeronde projecten tonen op de website?
    answer: >-
      Ja, je website krijgt een uitgebreid projectportfolio waar je per
      project foto's, een beschrijving en eventueel het type werk kunt
      vermelden. Denk aan verbouwingen, aanbouwen, dakopbouwen en
      nieuwbouwprojecten. Dit overtuigt nieuwe opdrachtgevers.
  - question: Hoe helpt een website mij aan grotere opdrachten?
    answer: >-
      Opdrachtgevers die een verbouwing of nieuwbouw plannen, doen
      uitgebreid onderzoek online. Een professionele website met projecten
      en reviews geeft hen het vertrouwen om jou te bellen in plaats van
      de concurrent. Grotere opdrachten beginnen bij een goede eerste indruk.
  - question: Ik heb het al druk genoeg, hoeveel werk is het?
    answer: >-
      Heel weinig. Wij bouwen de complete website voor je en verzorgen het
      onderhoud. Je levert je bedrijfsgegevens en projectfoto's aan, en wij
      doen de rest. Na oplevering hoef je er niets aan te doen - tenzij je
      wijzigingen wilt, die regelen wij ook.
  - question: Wat kost een website voor mijn aannemersbedrijf?
    answer: >-
      Onze websites beginnen vanaf €75 per maand, zonder opstartkosten of
      verborgen bijkomsten. Alles is inbegrepen: ontwerp, hosting,
      onderhoud, SSL-certificaat en SEO-optimalisatie. Bekijk onze
      pakketten voor de optie die het best bij jouw bedrijf past.
  - question: Kan ik ook mijn onderaannemers of samenwerkingen vermelden?
    answer: >-
      Zeker. We kunnen een sectie toevoegen waarin je je netwerk van
      vakmensen toelicht. Dit straalt betrouwbaarheid uit en laat zien dat
      je voor elk onderdeel van een project de juiste mensen inschakelt.
