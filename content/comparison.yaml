headline: Waarom Rodi Sites?
subtitle: >-
  Geen hoge investeringen vooraf. Geen gedoe met techniek. Gewoon een
  professionele website die werkt.
cards:
  - competitor: Wix & Squarespace
    label: Ontwerp op maat
    pain: Templates die iedereen gebruikt
    benefit: Uniek ontwerp voor jouw bedrijf
  - competitor: Freelancers
    label: Altijd bereikbaar
    pain: Verdwijnt of reageert niet meer
    benefit: Wij zijn er altijd voor je
  - competitor: Bureaus
    label: Geen opstartkosten
    pain: "\u20AC2.000 - \u20AC8.000 vooraf betalen"
    benefit: "\u20AC0, geen investering nodig"
  - competitor: Wix & Squarespace
    label: Wij doen het werk
    pain: Zelf bouwen, avonden en weekends
    benefit: Wij regelen alles voor je
  - competitor: Freelancers
    label: Zelf content aanpassen
    pain: Voor elke tekstwijziging afhankelijk van je freelancer
    benefit: Pas zelf teksten en foto's aan via een simpel beheerpaneel
  - competitor: Wix & Squarespace
    label: Gevonden worden op Google
    pain: Beperkte SEO-mogelijkheden, moeilijk vindbaar
    benefit: SEO-optimalisatie inbegrepen en doorlopend onderhouden
  - competitor: Wix & Squarespace
    label: Verborgen kosten
    pain: Apps, plugins en upgrades tikken snel aan
    benefit: Vast maandtarief, alles inbegrepen
  - competitor: Wix & Squarespace
    label: Geen technische beperkingen
    pain: Vastzitten aan wat het platform kan
    benefit: Op maat gebouwd, zonder limieten van een platform
  - competitor: Bureaus
    label: Snel online
    pain: 2 - 5 maanden wachten
    benefit: Binnen 2 weken live
